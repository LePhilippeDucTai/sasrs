[package]
name = "sas_interpreter"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "sasrs"
path = "src/main.rs"

[features]
# Spike M8 : processeur macro %let/&var derrière la couture preprocess::TextStage.
# OFF par défaut ; activer avec --features macros.
macros = []
# Stub M8 : backend de stockage S3 (trait LibraryProvider sur scan parquet cloud).
# OFF par défaut, NON branché dans LibraryManager/LIBNAME ; activer avec
# --features s3. L'I/O cloud réelle demandera d'activer plus tard les features
# Polars `cloud`/`aws` (suite). Voir src/library.rs (module s3).
s3 = []

[dependencies]
polars = { version = "0.46", features = [
    "lazy",
    "parquet",
    "dtype-date",
    "dtype-datetime",
    "dtype-time",
    "strings",
    "temporal",
    "round_series",
    "abs",
    "log",
    "cum_agg",
    "is_in",
    "cross_join",
    "semi_anti_join",
    "rank",
] }
clap = { version = "4", features = ["derive"] }
thiserror = "2"
tempfile = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"

[dev-dependencies]
insta = { version = "1", features = ["glob"] }
